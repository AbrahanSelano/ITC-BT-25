<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ITC-BT-25">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ITC-BT-25 Circuitos REBT</title>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--s2:#273549;--border:#334155;
  --accent:#3b82f6;--a2:#1d4ed8;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --gbg:#052e16;--abg:#451a03;--bbg:#1e3a5f;
  --R:12px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);
  padding:calc(var(--st) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:10}
.hdr-ico{width:34px;height:34px;background:var(--a2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:17px}
.hdr-t{font-size:16px;font-weight:600}
.hdr-s{font-size:11px;color:var(--muted);margin-top:1px}

/* PAGE: grid on top, content below — all scrolls together */
.page{padding:14px 14px calc(var(--sb)+20px)}

/* ─── GRID DE BOTONES ─── */
.grid-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px}
.btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}

/* Circuito normal */
.bc{background:var(--s2);border:1px solid var(--border);border-radius:9px;
  padding:9px 4px;text-align:center;cursor:pointer;transition:all .12s;
  color:var(--text);-webkit-user-select:none}
.bc:active{transform:scale(.94)}
.bc.on{background:var(--bbg);border-color:var(--accent)}
.bc .cod{font-size:15px;font-weight:700;color:var(--accent);display:block}
.bc .nm{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.25;display:block}
.bc.on .nm{color:#93c5fd}

/* Caída — fila completa */
.b-caida{grid-column:1/-1;background:linear-gradient(135deg,#1e3a5f,#172554);
  border:1px solid var(--accent);border-radius:9px;padding:11px 14px;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  color:var(--text);-webkit-user-select:none;transition:all .12s}
.b-caida:active{opacity:.8}
.b-caida.on{border-color:#93c5fd;background:linear-gradient(135deg,#1d4ed8,#1e40af)}
.b-caida .i{font-size:20px;flex-shrink:0}
.b-caida .t{font-size:13px;font-weight:700;color:#93c5fd}
.b-caida .s{font-size:10px;color:#64748b;margin-top:1px}

/* Esquemas — 2 botones, cada uno span 3/2 */
.b-esc{background:linear-gradient(135deg,#1a2e1a,#0f1f0f);
  border:1px solid var(--green);border-radius:9px;
  padding:11px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text);-webkit-user-select:none;transition:all .12s}
.b-esc:active{opacity:.8}
.b-esc.on{background:linear-gradient(135deg,#14532d,#052e16);border-color:#86efac}
.b-esc .i{font-size:18px}
.b-esc .t{font-size:11px;font-weight:700;color:#86efac;text-align:center;line-height:1.2}
.b-esc .s{font-size:9px;color:#4b7a50;text-align:center}

/* ─── CONTENIDO ─── */
.content{}

/* Hero circuito */
.hero{background:var(--surface);border-radius:var(--R);border:1px solid var(--border);
  padding:16px 14px 12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.hcode{font-size:40px;font-weight:800;color:var(--accent);line-height:1;flex-shrink:0}
.hname{font-size:17px;font-weight:600;line-height:1.2;margin-bottom:5px}
.hnorm{font-size:11px;color:var(--muted);background:var(--s2);
  display:inline-block;padding:2px 7px;border-radius:5px;border:1px solid var(--border)}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--R);padding:11px 12px}
.sc.ac{border-color:var(--accent);background:var(--bbg)}
.sc.gc{border-color:var(--green);background:var(--gbg)}
.sl{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:3px}
.sc.ac .sl{color:#93c5fd}.sc.gc .sl{color:#86efac}
.sv{font-size:21px;font-weight:700;line-height:1}
.su{font-size:11px;font-weight:400;color:var(--muted);margin-left:2px}
.sc.ac .sv{color:#93c5fd}.sc.gc .sv{color:#86efac}

.pb{background:linear-gradient(135deg,#1e3a5f,#172554);border:1px solid var(--accent);
  border-radius:var(--R);padding:12px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center}
.pl{font-size:10px;color:#93c5fd;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.pf{font-size:10px;color:#64748b;margin-top:2px}
.pv{font-size:26px;font-weight:800;color:#93c5fd}
.pu{font-size:12px;color:#64748b;text-align:right}

.ds{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--R);overflow:hidden;margin-bottom:10px}
.dst{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  color:var(--muted);padding:9px 13px 7px;border-bottom:1px solid var(--border);background:var(--s2)}
.dr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 13px;border-bottom:1px solid var(--border);gap:10px}
.dr:last-child{border-bottom:none}
.drl{display:flex;align-items:center;gap:9px;flex-shrink:0}
.di{width:28px;height:28px;border-radius:7px;background:var(--s2);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.dlb{font-size:12px;color:var(--muted);white-space:nowrap}
.dv{font-size:13px;font-weight:600;text-align:right;color:var(--text);flex-shrink:0}

.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.pb2{background:var(--bbg);color:#93c5fd;border:1px solid var(--accent)}
.pg{background:var(--gbg);color:#86efac;border:1px solid var(--green)}
.pa{background:var(--abg);color:#fcd34d;border:1px solid var(--amber)}
.nd{color:#475569;font-style:italic;font-size:12px}

.ns{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--R);overflow:hidden;margin-bottom:10px}
.ni{display:flex;gap:9px;padding:9px 13px;border-bottom:1px solid var(--border);align-items:flex-start}
.ni:last-child{border-bottom:none}
.nn{font-size:9px;font-weight:700;color:var(--accent);background:var(--bbg);
  border:1px solid var(--accent);border-radius:4px;padding:2px 5px;flex-shrink:0;margin-top:1px}
.nt{font-size:11px;color:var(--muted);line-height:1.5}

/* SCHEMA */
.sv2{background:var(--surface);border-radius:var(--R);border:1px solid var(--green);overflow:hidden;margin-bottom:10px}
.sh{background:linear-gradient(135deg,#14532d,#052e16);padding:13px 14px;
  border-bottom:1px solid var(--green);display:flex;align-items:center;gap:9px}
.sti{font-size:14px;font-weight:700;color:#86efac}
.ssu{font-size:10px;color:#4b7a50;margin-top:2px}
.siw{overflow:auto;-webkit-overflow-scrolling:touch;background:#fff;
  touch-action:pan-x pan-y pinch-zoom;max-height:50vh}
.siw img{display:block;width:100%;height:auto;cursor:zoom-in}
.siw.z img{width:220%;cursor:zoom-out}
.shi{font-size:10px;color:#475569;text-align:center;padding:6px;font-style:italic;
  border-top:1px solid var(--border)}
.sleg{padding:10px 13px;border-top:1px solid var(--border)}
.slt{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px}
.lr{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.lc{font-size:10px;font-weight:700;color:#86efac;background:#052e16;
  border:1px solid var(--green);border-radius:4px;padding:1px 5px;
  flex-shrink:0;min-width:34px;text-align:center}
.ld{font-size:11px;color:var(--muted);line-height:1.4}


/* PDF button — full width */
.b-pdf{grid-column:1/-1;background:linear-gradient(135deg,#3b0764,#1e1035);
  border:1px solid #a855f7;border-radius:9px;padding:11px 14px;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  color:var(--text);-webkit-user-select:none;transition:all .12s;text-decoration:none}
.b-pdf:active{opacity:.8}
.b-pdf.on{border-color:#d8b4fe;background:linear-gradient(135deg,#581c87,#3b0764)}
.b-pdf .i{font-size:20px;flex-shrink:0}
.b-pdf .t{font-size:13px;font-weight:700;color:#d8b4fe}
.b-pdf .s{font-size:10px;color:#7c3aed;margin-top:1px}
/* CALCULADORA */
.cs{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--R);overflow:hidden;margin-bottom:10px}
.ch{background:linear-gradient(135deg,#1e3a5f,#0f2240);padding:14px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ct{font-size:15px;font-weight:700;color:#93c5fd}
.csu{font-size:11px;color:#64748b;margin-top:2px}
.cf{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.cf label{font-size:12px;color:var(--muted);min-width:120px;flex-shrink:0}
.cf input,.cf select{flex:1;background:var(--s2);border:1px solid var(--border);
  border-radius:7px;padding:7px 9px;color:var(--text);font-size:13px;font-weight:600;
  outline:none;min-width:0}
.cf input:focus,.cf select:focus{border-color:var(--accent)}
.cb{width:100%;padding:13px;background:var(--a2);border:none;color:white;
  font-size:14px;font-weight:700;cursor:pointer}
.cb:active{background:#1e40af}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:10px;
  background:var(--s2);border-top:1px solid var(--border)}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.rc.ok{border-color:var(--green);background:var(--gbg)}
.rc.fail{border-color:var(--red);background:#450a0a}
.rc.hi{border-color:var(--accent);background:var(--bbg)}
.rl{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.4px;
  text-transform:uppercase;margin-bottom:2px}
.rc.ok .rl{color:#86efac}.rc.fail .rl{color:#fca5a5}.rc.hi .rl{color:#93c5fd}
.rv{font-size:18px;font-weight:800}
.rc.ok .rv{color:#86efac}.rc.fail .rv{color:#fca5a5}.rc.hi .rv{color:#93c5fd}
.ru{font-size:10px;color:var(--muted);font-weight:400}
.cbanner{grid-column:1/-1;border-radius:9px;padding:11px 14px;
  display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700}
.cbanner.ok{background:var(--gbg);border:1px solid var(--green);color:#86efac}
.cbanner.fail{background:#450a0a;border:1px solid var(--red);color:#fca5a5}
.fn{grid-column:1/-1;font-size:10px;color:#475569;line-height:1.6;padding:3px 0}

/* INSTALL */
#ib{display:none;position:fixed;bottom:calc(var(--sb)+12px);left:12px;right:12px;
  background:var(--a2);color:white;border-radius:var(--R);padding:12px 14px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:100;align-items:center;gap:10px}
#ib .ibt{flex:1;font-size:13px;font-weight:500}
#ib .ibs{font-size:10px;opacity:.8;margin-top:1px}
#ib .ibb{background:white;color:var(--a2);padding:7px 12px;border-radius:7px;
  font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer}
#ib .ibc{font-size:18px;opacity:.7;padding:3px;cursor:pointer}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-ico">⚡</div>
  <div>
    <div class="hdr-t">ITC-BT-25</div>
    <div class="hdr-s">Circuitos de vivienda · REBT</div>
  </div>
</div>

<div class="page">
  <div class="grid-label">Selecciona circuito o herramienta</div>
  <div class="btn-grid" id="grid"></div>
  <div class="content" id="content"></div>
</div>

<div id="ib">
  <span class="ibc" id="ibc">✕</span>
  <div class="ibt">Instalar app<div class="ibs">Funciona sin internet</div></div>
  <div class="ibb" id="ibb">Instalar</div>
</div>

<script>
const CK = ['C1','C2','C3','C4','C5','C8','C9','C10','C11'];
const CN = {C1:'Iluminac.',C2:'Tomas',C3:'Cocina',C4:'Lavadora',C5:'Baño',
            C8:'Calefacc.',C9:'Aire ac.',C10:'Secadora',C11:'Automat.'};
const CD = {
  C1:{n:'Iluminación',p:200,Fs:.75,Fu:.5,t:'Punto de luz',IA:10,pts:30,s:1.5,T:16,
    no:['Tensión: 230 V entre fase y neutro.','El punto de luz incluirá conductor de protección.']},
  C2:{n:'Tomas de uso general',p:3450,Fs:.2,Fu:.25,t:'Base 16A 2p+T',IA:16,pts:20,s:2.5,T:20,
    no:['Bases 16A 2p+T fijas según figura C2a (UNE 20315).']},
  C3:{n:'Cocina y horno',p:5400,Fs:.5,Fu:.75,t:'Base 25A 2p+T',IA:25,pts:2,s:6,T:25,
    no:['Potencia máxima: 5.750 W por circuito.','Bases 25A 2p+T según UNE 20315.']},
  C4:{n:'Lavadora, lavavajillas y termo',p:3450,Fs:.66,Fu:.75,t:'Base 16A 2p+T',IA:20,pts:3,s:4,T:20,
    no:['Potencia máxima: 2.300 W.','Sección 4 mm² parte de caja de derivación de 6 mm².','Cada toma puede conectarse con 2,5 mm².']},
  C5:{n:'Baño, cuarto de cocina',p:3450,Fs:.4,Fu:.5,t:'Base 16A 2p+T',IA:16,pts:6,s:2.5,T:20,
    no:['Potencia máxima: 5.750 W por circuito.']},
  C8:{n:'Calefacción',p:null,Fs:null,Fu:null,t:'—',IA:25,pts:null,s:6,T:25,
    no:['Potencia según proyecto.']},
  C9:{n:'Aire acondicionado',p:null,Fs:null,Fu:null,t:'—',IA:25,pts:null,s:6,T:25,
    no:['Potencia según proyecto.']},
  C10:{n:'Secadora',p:3450,Fs:1,Fu:.75,t:'Base 16A 2p+T',IA:16,pts:1,s:2.5,T:20,
    no:['Factor de simultaneidad 1,00 (uso individual).']},
  C11:{n:'Automatización',p:null,Fs:null,Fu:null,t:'—',IA:10,pts:null,s:1.5,T:16,
    no:['Tensión: 230 V entre fase y neutro.']}
};
const SCH = {
  basico:{img:'esquema-basico.png',tit:'Esquema Básico — Electrificación Básica',sub:'Hasta 5.750 W · ITC-BT-25',
    ley:[{c:'ICP',d:'Interruptor de Control de Potencia'},{c:'IGA',d:'Interruptor General Automático 25A o 32A'},
      {c:'IDif',d:'Diferencial 40A / 30mA'},{c:'C1',d:'Iluminación — 10A · 2×1,5+1,5 mm²'},
      {c:'C2',d:'TC usos varios — 16A · 2×2,5+2,5 mm²'},{c:'C3',d:'Cocina-horno — 25A · 2×6+6 mm²'},
      {c:'C4',d:'Lavavajillas / Termo / Lavadora — 16A · 2×2,5+2,5 mm²'},
      {c:'C5',d:'TC baño y cocina — 16A · 2×2,5+2,5 mm²'}]},
  elevado:{img:'esquema-elevado.png',tit:'Esquema Elevado — Electrificación Elevada',sub:'Más de 5.750 W · ITC-BT-25',
    ley:[{c:'ICP',d:'Interruptor de Control de Potencia'},{c:'IGA',d:'IGA 40A'},
      {c:'IDif',d:'Diferenciales 40A / 30mA (varios)'},{c:'C1',d:'Iluminación 1 — 10A · 2×1,5+1,5 mm²'},
      {c:'C6',d:'Iluminación 2 — 10A · 2×2,5+2,5 mm²'},{c:'C2',d:'TC general 1 — 16A · 2×2,5+2,5 mm²'},
      {c:'C7',d:'TC general 2 — 16A · 2×2,5+2,5 mm²'},{c:'C3',d:'Cocina-Horno — 25A · 2×6+6 mm²'},
      {c:'C4',d:'Lavavajillas/Termo/Lavadora — 16A · 2×2,5+2,5 mm²'},
      {c:'C5',d:'TC baño y cocina — 16A · 2×2,5+2,5 mm²'},
      {c:'C8',d:'Calefacción — 25A · 2×6+6 mm²'},{c:'C9',d:'Aire acondicionado — 25A · 2×6+6 mm²'},
      {c:'C10',d:'Secadora — 16A · 2×2,5+2,5 mm²'},{c:'C11',d:'Domótica — 2×1,5+1,5 mm²'}]}
};

let sel='C1', mode='info';

function pill(v,cl,u=''){
  if(v==null) return '<span class="nd">—</span>';
  return '<span class="pill '+cl+'">'+v+(u?' '+u:'')+'</span>';
}

function buildGrid(){
  let h='';
  // 9 circuit buttons
  CK.forEach(k=>{
    h+='<button class="bc'+(k===sel&&mode==='info'?' on':'')+'" onclick="go(\''+k+'\')"><span class="cod">'+k+'</span><span class="nm">'+CN[k]+'</span></button>';
  });
  // Caída full width
  h+='<button class="b-caida'+(mode==='caida'?' on':'')+'" onclick="goCaida()"><span class="i">📉</span><div><div class="t">Caída de tensión ΔV</div><div class="s">ITC-BT-19 · Cu/Al · Mono/Tri</div></div></button>';
  // Esquema básico
  h+='<button class="b-esc'+(mode==='basico'?' on':'')+'" onclick="goSch(\'basico\')"><span class="i">📋</span><span class="t">Esquema Básico</span><span class="s">Electrific. básica</span></button>';
  // Esquema elevado span 2
  h+='<button class="b-esc'+(mode==='elevado'?' on':'')+'" style="grid-column:span 2" onclick="goSch(\'elevado\')"><span class="i">📐</span><span class="t">Esquema Elevado</span><span class="s">Electrific. elevada</span></button>';
    // PDF Instalaciones Sanitarias — full width
  h+='<button class="b-pdf'+(mode==='pdf'?' on':'')+'" onclick="goPdf()"><span class="i">📄</span><div><div class="t">Instalaciones Sanitarias</div><div class="s">PDF · 334 páginas · Adobe InDesign</div></div></button>';
  document.getElementById('grid').innerHTML=h;
}

function showInfo(){
  const d=CD[sel];
  const hc=d.p&&d.Fs&&d.Fu&&d.pts;
  const pt=hc?Math.round(d.pts*d.p*d.Fs*d.Fu):null;
  let h='';
  h+='<div class="hero"><div class="hcode">'+sel+'</div><div><div class="hname">'+d.n+'</div><span class="hnorm">ITC-BT-25 · REBT</span></div></div>';
  h+='<div class="sg"><div class="sc ac"><div class="sl">⚡ Interruptor</div><div class="sv">'+d.IA+'<span class="su">A</span></div></div><div class="sc gc"><div class="sl">🔌 Sección mín.</div><div class="sv">'+d.s+'<span class="su">mm²</span></div></div></div>';
  if(hc) h+='<div class="pb"><div><div class="pl">Potencia total estimada</div><div class="pf">'+d.pts+' × '+d.p+' W × '+d.Fs+' × '+d.Fu+'</div></div><div><div class="pv">'+pt.toLocaleString('es-ES')+'</div><div class="pu">W</div></div></div>';
  h+='<div class="ds"><div class="dst">Características eléctricas</div>';
  h+='<div class="dr"><div class="drl"><div class="di">🔋</div><span class="dlb">Potencia por toma</span></div><div class="dv">'+(d.p?d.p+' W':'<span class="nd">Según proyecto</span>')+'</div></div>';
  h+='<div class="dr"><div class="drl"><div class="di">⚖️</div><span class="dlb">Factor simultán. Fs</span></div><div class="dv">'+(d.Fs!=null?d.Fs:'<span class="nd">—</span>')+'</div></div>';
  h+='<div class="dr"><div class="drl"><div class="di">📊</div><span class="dlb">Factor utilización Fu</span></div><div class="dv">'+(d.Fu!=null?d.Fu:'<span class="nd">—</span>')+'</div></div>';
  h+='<div class="dr"><div class="drl"><div class="di">🔌</div><span class="dlb">Tipo de toma</span></div><div class="dv" style="font-size:12px">'+d.t+'</div></div>';
  h+='<div class="dr"><div class="drl"><div class="di">🔢</div><span class="dlb">Máx. puntos/circuito</span></div><div class="dv">'+(d.pts!=null?d.pts:'<span class="nd">—</span>')+'</div></div></div>';
  h+='<div class="ds"><div class="dst">Cableado</div>';
  h+='<div class="dr"><div class="drl"><div class="di">〰️</div><span class="dlb">Sección conductores</span></div><div class="dv">'+pill(d.s,'pg','mm²')+'</div></div>';
  h+='<div class="dr"><div class="drl"><div class="di">⭕</div><span class="dlb">Tubo / conducto Ø</span></div><div class="dv">'+pill(d.T,'pa','mm')+'</div></div>';
  h+='<div class="dr"><div class="drl"><div class="di">🔒</div><span class="dlb">Interruptor automático</span></div><div class="dv">'+pill(d.IA,'pb2','A')+'</div></div></div>';
  if(d.no&&d.no.length){
    h+='<div class="ns"><div class="dst">Notas ITC-BT-25</div>';
    d.no.forEach((n,i)=>{h+='<div class="ni"><span class="nn">'+(i+1)+'</span><span class="nt">'+n+'</span></div>';});
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}

function showCaida(){
  document.getElementById('content').innerHTML='<div class="cs"><div class="ch"><span style="font-size:26px">📉</span><div><div class="ct">Caída de tensión ΔV</div><div class="csu">ITC-BT-19 · REBT · Monofásico / Trifásico</div></div></div><div class="cf"><label>Sistema</label><select id="cs"><option value="mono">Monofásico</option><option value="tri">Trifásico</option></select></div><div class="cf"><label>Tensión (V)</label><input type="number" id="cv" value="230" min="1"></div><div class="cf"><label>Potencia (W)</label><input type="number" id="cp" value="3000" min="1"></div><div class="cf"><label>Factor potencia</label><input type="number" id="cfp" value="0.9" step="0.01" min="0.1" max="1"></div><div class="cf"><label>Longitud (m)</label><input type="number" id="cl" value="50" min="1"></div><div class="cf"><label>Sección (mm²)</label><select id="cse"><option value="1.5">1,5</option><option value="2.5">2,5</option><option value="4">4</option><option value="6" selected>6</option><option value="10">10</option><option value="16">16</option><option value="25">25</option><option value="35">35</option><option value="50">50</option><option value="70">70</option><option value="95">95</option><option value="120">120</option><option value="150">150</option><option value="185">185</option><option value="240">240</option></select></div><div class="cf"><label>Material</label><select id="cm"><option value="56">Cobre (Cu)</option><option value="35">Aluminio (Al)</option></select></div><div class="cf"><label>Límite caída</label><select id="clim"><option value="3">3% — Vivienda</option><option value="5">5% — Industrial</option></select></div><button class="cb" onclick="calc()">⚡  CALCULAR</button><div id="ra"></div></div>';
}

function calc(){
  const sis=document.getElementById('cs').value;
  const Vn=+document.getElementById('cv').value;
  const P=+document.getElementById('cp').value;
  const fp=+document.getElementById('cfp').value;
  const L=+document.getElementById('cl').value;
  const S=+document.getElementById('cse').value;
  const g=+document.getElementById('cm').value;
  const lim=+document.getElementById('clim').value;
  if([Vn,P,fp,L,S,g].some(v=>!v)) return;
  const I=sis==='mono'?P/(Vn*fp):P/(Math.sqrt(3)*Vn*fp);
  const R=sis==='mono'?2*L/(g*S):Math.sqrt(3)*L/(g*S);
  const dV=sis==='mono'?2*P*L/(g*S*Vn):P*L/(g*S*Vn);
  const pct=dV/Vn*100;
  const ok=pct<=lim;
  document.getElementById('ra').innerHTML='<div class="rg"><div class="cbanner '+(ok?'ok':'fail')+'"><span style="font-size:20px">'+(ok?'✅':'❌')+'</span><div><div>'+(ok?'SÍ CUMPLE REBT':'NO CUMPLE REBT')+'</div><div style="font-size:11px;font-weight:400;opacity:.8">'+pct.toFixed(3)+'% '+(ok?'≤':'>')+' '+lim+'% límite</div></div></div><div class="rc hi"><div class="rl">Corriente I</div><div class="rv">'+I.toFixed(2)+'<span class="ru"> A</span></div></div><div class="rc hi"><div class="rl">Resistencia R</div><div class="rv">'+R.toFixed(4)+'<span class="ru"> Ω</span></div></div><div class="rc '+(ok?'ok':'fail')+'"><div class="rl">Caída ΔV</div><div class="rv">'+dV.toFixed(3)+'<span class="ru"> V</span></div></div><div class="rc '+(ok?'ok':'fail')+'"><div class="rl">Caída ΔV%</div><div class="rv">'+pct.toFixed(3)+'<span class="ru"> %</span></div></div><div class="fn">'+(sis==='mono'?'Mono: ΔV=2·P·L/(γ·S·Vn)':'Tri: ΔV=P·L/(γ·S·Vn)')+'<br>γCu=56 · γAl=35 m/Ω·mm²</div></div>';
}

function showSchema(tipo){
  const s=SCH[tipo];
  let h='<div class="sv2"><div class="sh"><span style="font-size:22px">'+(tipo==='basico'?'📋':'📐')+'</span><div><div class="sti">'+s.tit+'</div><div class="ssu">'+s.sub+'</div></div></div>';
  h+='<div class="siw" id="siw" onclick="toggleZ()"><img src="'+s.img+'" alt="'+s.tit+'"></div>';
  h+='<div class="shi">Toca la imagen para ampliar · Pellizca para hacer zoom</div>';
  h+='<div class="sleg"><div class="slt">Leyenda</div>';
  s.ley.forEach(l=>{h+='<div class="lr"><span class="lc">'+l.c+'</span><span class="ld">'+l.d+'</span></div>';});
  h+='</div></div>';
  document.getElementById('content').innerHTML=h;
}
